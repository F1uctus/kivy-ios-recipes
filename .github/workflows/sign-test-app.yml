name: ios signing test (optional)

on:
  workflow_dispatch:
    inputs:
      team_id:
        description: "Apple Developer Team ID (for signing)"
        required: true
      bundle_id:
        description: "Bundle identifier, e.g. com.example.app"
        required: true

jobs:
  sign-test:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Import signing cert (P12)
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
        run: |
          if [ -z "${IOS_CERT_P12_BASE64}" ] || [ -z "${IOS_CERT_PASSWORD}" ]; then
            echo "Missing signing secrets; configure IOS_CERT_P12_BASE64 and IOS_CERT_PASSWORD."
            exit 1
          fi
          echo "${IOS_CERT_P12_BASE64}" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "${IOS_CERT_PASSWORD}" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install provisioning profile
        env:
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          if [ -z "${IOS_MOBILEPROVISION_BASE64}" ]; then
            echo "Missing IOS_MOBILEPROVISION_BASE64 secret."
            exit 1
          fi
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"
          echo "${IOS_MOBILEPROVISION_BASE64}" | base64 --decode > "${PROFILE_PATH}"
          echo "Installed provisioning profile at ${PROFILE_PATH}"

      - name: Build a minimal signed app (placeholder)
        env:
          TEAM_ID: ${{ inputs.team_id }}
          BUNDLE_ID: ${{ inputs.bundle_id }}
        run: |
          # This workflow is intentionally gated and optional.
          # In later iterations we will add a small Xcode testbed app that embeds
          # the produced Python distribution and validates launch + imports.
          echo "TEAM_ID=${TEAM_ID}"
          echo "BUNDLE_ID=${BUNDLE_ID}"
          echo "TODO: add Xcode test app project and xcodebuild archive/export steps."

