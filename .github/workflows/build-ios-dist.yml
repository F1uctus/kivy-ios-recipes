name: ios python dist build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "kivy-ios target platform"
        required: true
        default: "iphoneos-arm64"
        type: choice
        options:
          - iphoneos-arm64
          - iphonesimulator-arm64
      build_spacy:
        description: "Also build spaCy stack and verify dist layout (import tests need simulator/device)"
        required: false
        default: false
        type: boolean
  push:
    paths:
      - "**"

jobs:
  verify-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify pins match upstream
        run: |
          python3 scripts/pins_check.py ios-python-pins.json

  build:
    needs: verify-pins
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      PLATFORM: ${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'iphoneos-arm64' }}
      BUILD_SPACY: ${{ github.event_name == 'workflow_dispatch' && inputs.build_spacy && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ env.PLATFORM }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.PLATFORM }}-

      - name: Install build deps (brew)
        run: |
          brew update
          brew install autoconf automake libtool pkg-config ccache

      - name: Install Rust toolchain (optional spaCy deps)
        if: env.BUILD_SPACY == '1'
        run: |
          if ! command -v cargo >/dev/null 2>&1; then
            brew install rust
          fi
          cargo --version

      - name: Install toolchains
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt

      - name: Build dist (custom recipes)
        env:
          USE_CCACHE: "1"
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          mkdir -p "${CCACHE_DIR}"
          CUSTOM_ARGS="$(python scripts/ci/custom_recipes_args.py | tr '\n' ' ')"
          toolchain build python3 --platform "${PLATFORM}" ${CUSTOM_ARGS}

      - name: Build spaCy stack (optional, reuses python3 dist)
        if: env.BUILD_SPACY == '1'
        env:
          USE_CCACHE: "1"
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          mkdir -p "${CCACHE_DIR}"
          CUSTOM_ARGS="$(python scripts/ci/custom_recipes_args.py | tr '\n' ' ')"
          toolchain build spacy --platform "${PLATFORM}" ${CUSTOM_ARGS}

      - name: Pack dist artifact
        run: |
          mkdir -p ios-dist
          # kivy-ios installs into its dist dir; collect a minimal snapshot.
          # The exact artifact format will be hardened iteratively.
          if [ -d "dist" ]; then
            cp -a dist ios-dist/dist
          fi
          cp -a pins.json ios-dist/
          (cd ios-dist && zip -r ../ios-python-dist-${PLATFORM}.zip .)

      - name: Smoke test (hostpython)
        if: always()
        run: |
          # Hostpython is macOS CPython: use it only for stdlib / build sanity.
          # Never point hostpython at iOS-built site-packages for import tests;
          # native extensions (.so) are for iOS / iOS Simulator, not the host.
          if [ -x "dist/hostpython3/bin/python" ]; then
            dist/hostpython3/bin/python -c "import sys; print(sys.version)"
            dist/hostpython3/bin/python scripts/smoke_test.py
          else
            echo "hostpython not found; skipping smoke test"
          fi

      - name: Verify spaCy dist layout (no imports)
        if: env.BUILD_SPACY == '1' && success()
        run: |
          python3 scripts/ci/verify_spacy_dist_layout.py

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-python-dist-${{ env.PLATFORM }}
          path: ios-python-dist-${{ env.PLATFORM }}.zip

# Import-based spaCy checks (scripts/smoke_test_spacy.py) must run in an iOS
# process. Hosted macos-latest can drive the iOS Simulator (arm64, close to
# Apple Silicon devices) via Xcode, but you still need an app target that embeds
# libpython and bundles dist/root/python3, then xcodebuild/xctest or simctl.
# Real devices are not available on GitHub-hosted runners.

